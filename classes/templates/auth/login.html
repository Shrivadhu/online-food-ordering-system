<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login – Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🍜 Food<span>Ordering<span>System</span></h1>
      <p>Order food from the best restaurants near you</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">⚠️ <span th:text="${error}"></span></div>
    <div th:if="${message}" class="alert alert-success">✅ <span th:text="${message}"></span></div>
    <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>

    <form th:action="@{/auth/login}" method="post">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In →</button>
    </form>

    <div class="divider">Don't have an account?</div>
    <a href="/auth/register" class="btn btn-outline btn-block">Create Account</a>

    <div style="margin-top:1.5rem; padding:1rem; background:rgba(255,255,255,0.03); border-radius:10px; font-size:0.78rem; color:var(--text-muted);">
      <strong style="color:var(--text);">Demo Accounts</strong><br/>
      Admin: admin@food.com / admin123<br/>
      Customer: arjun@customer.com / cust123<br/>
      Restaurant: spicegardenrest@food.com / rest123<br/>
      Delivery: ravi@delivery.com / del123
    </div>
  </div>
</div>
</body>
</html>
