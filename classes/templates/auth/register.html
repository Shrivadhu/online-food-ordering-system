<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Register – Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <h1>🍜 Food<span>Ordering<span>System</span></h1>
      <p>Join us and start ordering delicious food</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">⚠️ <span th:text="${error}"></span></div>

    <div class="tab-btns">
      <button class="tab-btn active" onclick="showTab('customer')">Customer</button>
      <button class="tab-btn" onclick="showTab('restaurant')">Restaurant</button>
      <button class="tab-btn" onclick="showTab('delivery')">Delivery</button>
    </div>

    <!-- Customer -->
    <div id="tab-customer" class="tab-pane active">
      <form th:action="@{/auth/register/customer}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" placeholder="Your name" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" placeholder="10-digit number" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Delivery Address</label>
          <input type="text" name="address" class="form-control" placeholder="Your default address" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">Register as Customer</button>
      </form>
    </div>

    <!-- Restaurant -->
    <div id="tab-restaurant" class="tab-pane">
      <form th:action="@{/auth/register/restaurant}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Owner Name</label>
            <input type="text" name="name" class="form-control" placeholder="Owner name" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Restaurant Name</label>
            <input type="text" name="restaurantName" class="form-control" placeholder="Restaurant name" required/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="restaurant@email.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-control" placeholder="Area, City" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">Register Restaurant</button>
      </form>
    </div>

    <!-- Delivery -->
    <div id="tab-delivery" class="tab-pane">
      <form th:action="@{/auth/register/delivery}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" name="name" class="form-control" placeholder="Your name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@email.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Vehicle Number</label>
          <input type="text" name="vehicleNo" class="form-control" placeholder="KA-01-AB-1234" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">Register as Delivery Person</button>
      </form>
    </div>

    <div class="divider">Already have an account?</div>
    <a href="/auth/login" class="btn btn-outline btn-block">Sign In</a>
  </div>
</div>
<script>
function showTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
