<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Restaurant Dashboard - Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/restaurant/dashboard" class="navbar-brand">Food Ordering System</a>
  <ul class="nav-links">
    <li><a href="/restaurant/dashboard" class="active">Dashboard</a></li>
    <li><a href="/restaurant/orders">Orders</a></li>
    <li><a href="/restaurant/menu">Menu</a></li>
    <li><a href="/restaurant/factory">🏭 FoodFactory</a></li>
  </ul>
  <form th:action="@{/auth/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title" th:text="${restaurant.restaurantName}">Restaurant</h1>
    <p class="page-subtitle">Restaurant Dashboard</p>
  </div>
  <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon orange">&#128722;</div>
      <div><div class="stat-value" th:text="${totalOrders}">0</div><div class="stat-label">Total Orders</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">&#9203;</div>
      <div><div class="stat-value" th:text="${pendingOrders}">0</div><div class="stat-label">Pending</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">&#10003;</div>
      <div><div class="stat-value" th:text="${confirmedOrders}">0</div><div class="stat-label">Confirmed</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">&#127859;</div>
      <div><div class="stat-value" th:text="${totalItems}">0</div><div class="stat-label">Menu Items</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">Recent Orders
      <a href="/restaurant/orders" class="btn btn-outline btn-sm">View All</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>
          <tr th:each="order : ${recentOrders}">
            <td>#<span th:text="${order.orderId}"></span></td>
            <td th:text="${order.customer.name}">Customer</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              <span th:each="item,i : ${order.items}"><span th:text="${item.foodItem.name}"></span><span th:if="${!i.last}">, </span></span>
            </td>
            <td style="color:var(--accent);font-weight:600;">Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span></td>
            <td><span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}"></span></td>
            <td>
              <span th:if="${order.status.name() == 'PLACED'}">
                <form th:action="@{/restaurant/orders/{id}/accept(id=${order.orderId})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-success btn-sm">Accept</button>
                </form>
                <form th:action="@{/restaurant/orders/{id}/reject(id=${order.orderId})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm">Reject</button>
                </form>
              </span>
              <span th:if="${order.status.name() == 'CONFIRMED'}">
                <form th:action="@{/restaurant/orders/{id}/prepared(id=${order.orderId})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-info btn-sm">Mark Ready</button>
                </form>
              </span>
              <span th:if="${order.status.name() != 'PLACED' && order.status.name() != 'CONFIRMED'}" style="color:var(--text-muted);font-size:0.85rem;" th:text="${order.status}"></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
