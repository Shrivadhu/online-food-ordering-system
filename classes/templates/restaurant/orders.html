<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Orders - Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/restaurant/dashboard" class="navbar-brand">Food Ordering System</a>
  <ul class="nav-links">
    <li><a href="/restaurant/dashboard">Dashboard</a></li>
    <li><a href="/restaurant/orders" class="active">Orders</a></li>
    <li><a href="/restaurant/menu">Menu</a></li>
    <li><a href="/restaurant/factory">🏭 FoodFactory</a></li>
  </ul>
  <form th:action="@{/auth/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">All Orders</h1></div>
  <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Order #</th><th>Customer</th><th>Items</th><th>Address</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
          <tr th:each="order : ${orders}">
            <td>#<span th:text="${order.orderId}"></span></td>
            <td th:text="${order.customer.name}">Customer</td>
            <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              <span th:each="item,i : ${order.items}"><span th:text="${item.foodItem.name}"></span><span th:if="${!i.last}">, </span></span>
            </td>
            <td style="font-size:0.82rem;color:var(--text-muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;" th:text="${order.deliveryAddress}">Address</td>
            <td style="color:var(--accent);font-weight:600;">Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span></td>
            <td style="font-size:0.82rem;" th:text="${#temporals.format(order.orderDate,'dd MMM')}">Date</td>
            <td><span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}"></span></td>
            <td>
              <span th:if="${order.status.name() == 'PLACED'}">
                <form th:action="@{/restaurant/orders/{id}/accept(id=${order.orderId})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-success btn-sm">Accept</button>
                </form>
                <form th:action="@{/restaurant/orders/{id}/reject(id=${order.orderId})}" method="post" style="display:inline;margin-left:4px;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-danger btn-sm">Reject</button>
                </form>
              </span>
              <span th:if="${order.status.name() == 'CONFIRMED'}">
                <form th:action="@{/restaurant/orders/{id}/prepared(id=${order.orderId})}" method="post" style="display:inline;">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button class="btn btn-info btn-sm">Mark Ready</button>
                </form>
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
