<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>All Orders - Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<style>
  .refund-btn { background:#dc3545; color:#fff; border:none; padding:4px 12px; border-radius:6px; cursor:pointer; font-size:.8rem; font-weight:600; }
  .refund-btn:hover { background:#c82333; }
</style>
</head>
<body>
<nav class="navbar">
  <a href="/admin/dashboard" class="navbar-brand">Food Ordering System Admin</a>
  <ul class="nav-links">
    <li><a href="/admin/dashboard">Dashboard</a></li>
    <li><a href="/admin/orders" class="active">Orders</a></li>
    <li><a href="/admin/users">Users</a></li>
    <li><a href="/admin/restaurants">Restaurants</a></li>
    <li><a href="/admin/refunds">Refunds</a></li>
  </ul>
  <form th:action="@{/auth/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">All Orders</h1></div>
  <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
  <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order #</th>
            <th>Customer</th>
            <th>Restaurant</th>
            <th>Delivery Person</th>
            <th>Amount</th>
            <th>Payment</th>
            <th>Date</th>
            <th>Status</th>
            <th>Refund</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order : ${orders}">
            <td>#<span th:text="${order.orderId}"></span></td>
            <td th:text="${order.customer.name}"></td>
            <td th:text="${order.restaurant.restaurantName}"></td>
            <td th:text="${order.deliveryPerson != null ? order.deliveryPerson.name : 'Unassigned'}"
                style="color:var(--text-muted);font-size:0.85rem;"></td>
            <td style="color:var(--accent);font-weight:600;">
              Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span>
            </td>
            <td>
              <span th:if="${order.payment != null}" class="badge"
                    th:classappend="${order.payment.paymentStatus.name() == 'SUCCESS' ? 'badge-delivered' : order.payment.paymentStatus.name() == 'FAILED' ? 'badge-cancelled' : 'badge-warning'}"
                    th:text="${order.payment.paymentStatus}"></span>
              <span th:if="${order.payment == null}" style="color:var(--text-muted);">-</span>
            </td>
            <td style="font-size:0.82rem;"
                th:text="${#temporals.format(order.orderDate,'dd MMM yyyy')}"></td>
            <td>
              <span class="badge"
                    th:classappend="${order.status.name() == 'DELIVERED' ? 'badge-delivered' :
                                     order.status.name() == 'CANCELLED' ? 'badge-cancelled' :
                                     order.status.name() == 'PREPARED' ? 'badge-out' :
                                     order.status.name() == 'CONFIRMED' ? 'badge-confirmed' : 'badge-warning'}"
                    th:text="${order.status}"></span>
            </td>
            <td>
              <!-- Show Refund button only if payment was SUCCESS and order not already CANCELLED -->
              <form th:if="${order.payment != null
                              and order.payment.paymentStatus.name() == 'SUCCESS'
                              and order.status.name() != 'CANCELLED'}"
                    th:action="@{/admin/orders/{id}/refund(id=${order.orderId})}"
                    method="post"
                    onsubmit="return confirm('Process refund for this order?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="reason" value="Admin initiated refund"/>
                <button type="submit" class="refund-btn">💰 Refund</button>
              </form>
              <span th:if="${order.status.name() == 'CANCELLED'}"
                    style="color:var(--text-muted);font-size:.8rem;">Refunded</span>
              <span th:if="${order.payment == null or order.payment.paymentStatus.name() != 'SUCCESS'}"
                    th:unless="${order.status.name() == 'CANCELLED'}"
                    style="color:var(--text-muted);font-size:.8rem;">N/A</span>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(orders)}">
            <td colspan="9" style="text-align:center;color:var(--text-muted);padding:2rem;">No orders yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
