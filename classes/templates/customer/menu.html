<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title th:text="${restaurant.restaurantName} + ' – Food Ordering System'">Menu</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a href="/customer/home" class="navbar-brand">🍜 Food<span>Ordering<span>System</span></a>
  <ul class="nav-links">
    <li><a href="/customer/home">Restaurants</a></li>
    <li><a href="/customer/orders">My Orders</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="/customer/cart" class="cart-badge">🛒 Cart <span th:text="${cartCount}">0</span></a>
    <form th:action="@{/auth/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn">Logout</button>
    </form>
  </div>
</nav>

<div class="page-wrapper">
  <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>

  <!-- Restaurant Header -->
  <div style="display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:2rem;">
    <div style="width:80px;height:80px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;">🍛</div>
    <div>
      <h1 style="font-family:'Playfair Display',serif;font-size:2rem;" th:text="${restaurant.restaurantName}">Restaurant</h1>
      <p style="color:var(--text-muted);margin-top:4px;">📍 <span th:text="${restaurant.location}">Location</span></p>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <span class="badge badge-confirmed">⭐ 4.5 Rating</span>
        <span class="badge badge-placed">🕐 30-45 min</span>
        <span class="badge badge-delivered">🆓 Free Delivery</span>
      </div>
    </div>
  </div>

  <!-- Menus -->
  <div th:each="menu : ${menus}">
    <div class="section-header">
      <h2 class="section-title" th:text="${menu.menuName}">Menu</h2>
      <div class="section-line"></div>
    </div>

    <div class="food-grid" style="margin-bottom:2rem;">
      <div th:each="item : ${menu.foodItems}" th:if="${item.available}" class="food-card">
        <div class="food-img">
          <span th:text="${item.category == 'Vegetarian' ? '🥦' : (item.category == 'Non-Vegetarian' ? '🍖' : (item.category == 'Beverage' ? '🥤' : (item.category == 'Dessert' ? '🍮' : '🍽️')))}">🍽️</span>
        </div>
        <div class="food-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div class="food-name" th:text="${item.name}">Item Name</div>
            <span class="category-badge"
                  th:classappend="${item.category == 'Vegetarian' ? 'cat-veg' : (item.category == 'Non-Vegetarian' ? 'cat-nonveg' : (item.category == 'Beverage' ? 'cat-bev' : (item.category == 'Dessert' ? 'cat-dessert' : 'cat-other')))}"
                  th:text="${item.category == 'Vegetarian' ? '🌿 Veg' : (item.category == 'Non-Vegetarian' ? '🍗 Non-Veg' : (item.category == 'Beverage' ? '🥤 Drink' : (item.category == 'Dessert' ? '🍰 Dessert' : 'Other')))}">
            </span>
          </div>
          <div class="food-desc" th:text="${item.description}">Description</div>
          <div class="food-footer">
            <span class="food-price">₹<span th:text="${item.price}">0</span></span>
            <form th:action="@{/customer/cart/add}" method="post" style="display:flex;align-items:center;gap:8px;">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="foodItemId" th:value="${item.foodId}"/>
              <input type="hidden" name="restaurantId" th:value="${restaurant.userId}"/>
              <input type="number" name="quantity" value="1" min="1" max="10"
                     style="width:50px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);padding:6px 8px;border-radius:6px;font-family:inherit;text-align:center;"/>
              <button type="submit" class="btn btn-primary btn-sm">+ Add</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(menus)}" class="empty-state">
    <div class="empty-icon">🍽️</div>
    <h3>Menu not available yet</h3>
    <p>This restaurant hasn't added any items.</p>
  </div>
</div>
</body>
</html>
