<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>My Orders - Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/customer/home" class="navbar-brand">Food Ordering System</a>
  <ul class="nav-links">
    <li><a href="/customer/home">Restaurants</a></li>
    <li><a href="/customer/orders" class="active">My Orders</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="/customer/cart" class="cart-badge">Cart <span th:text="${cartCount}">0</span></a>
    <form th:action="@{/auth/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn">Logout</button>
    </form>
  </div>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">My Orders</h1></div>
  <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
  <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
    <div class="empty-icon">&#128722;</div>
    <h3>No orders yet</h3>
    <p>Start ordering from your favourite restaurants!</p>
    <a href="/customer/home" class="btn btn-primary" style="margin-top:1.5rem;">Order Now</a>
  </div>
  <div th:each="order : ${orders}" class="order-card">
    <div class="order-header">
      <div>
        <div class="order-id">Order #<span th:text="${order.orderId}"></span></div>
        <div class="order-meta">
          <span th:text="${order.restaurant.restaurantName}">Restaurant</span> &middot;
          <span th:text="${#temporals.format(order.orderDate,'dd MMM yyyy')}">Date</span>
        </div>
      </div>
      <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}">Status</span>
    </div>
    <div class="order-items">
      <span th:each="item,i : ${order.items}"><span th:text="${item.foodItem.name}">Item</span><span th:if="${!i.last}">, </span></span>
    </div>
    <div class="order-footer">
      <span class="order-amount">Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}">0</span></span>
      <a th:href="@{/customer/orders/{id}(id=${order.orderId})}" class="btn btn-outline btn-sm">Track Order</a>
    </div>
  </div>
</div>
</body>
</html>
