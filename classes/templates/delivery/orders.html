<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Deliveries - Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/delivery/dashboard" class="navbar-brand">Food Ordering System</a>
  <ul class="nav-links">
    <li><a href="/delivery/dashboard">Dashboard</a></li>
    <li><a href="/delivery/orders" class="active">My Deliveries</a></li>
  </ul>
  <form th:action="@{/auth/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">Deliveries</h1></div>
  <div th:if="${success}" class="alert alert-success"><span th:text="${success}"></span></div>
  <div th:if="${!#lists.isEmpty(availableOrders)}">
    <h2 style="font-family:'Playfair Display',serif;margin-bottom:1rem;color:var(--accent);">Available for Pickup</h2>
    <div th:each="order : ${availableOrders}" class="order-card" style="border-color:rgba(255,215,0,0.3);">
      <div class="order-header">
        <div>
          <div class="order-id">Order #<span th:text="${order.orderId}"></span></div>
          <div class="order-meta" th:text="${order.restaurant.restaurantName}"></div>
          <div class="order-meta">To: <span th:text="${order.deliveryAddress}"></span></div>
        </div>
        <span class="badge badge-prepared">READY</span>
      </div>
      <div class="order-footer">
        <span class="order-amount">Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span></span>
        <form th:action="@{/delivery/orders/{id}/pickup(id=${order.orderId})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-success">Accept and Pickup</button>
        </form>
      </div>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(availableOrders)}" class="alert alert-info" style="margin-bottom:1.5rem;">No orders ready for pickup right now.</div>
  <h2 style="font-family:'Playfair Display',serif;margin:1.5rem 0 1rem;">My Deliveries</h2>
  <div th:each="order : ${myOrders}" class="order-card">
    <div class="order-header">
      <div>
        <div class="order-id">Order #<span th:text="${order.orderId}"></span></div>
        <div class="order-meta" th:text="${order.customer.name}"></div>
        <div class="order-meta">To: <span th:text="${order.deliveryAddress}"></span></div>
      </div>
      <span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}"></span>
    </div>
    <div class="order-footer">
      <span class="order-amount">Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span></span>
      <span th:if="${order.status.name() == 'OUT_OF_DELIVERY'}">
        <form th:action="@{/delivery/orders/{id}/deliver(id=${order.orderId})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-success">Mark Delivered</button>
        </form>
      </span>
    </div>
  </div>
  <div th:if="${#lists.isEmpty(myOrders)}" class="empty-state">
    <div class="empty-icon">&#128665;</div>
    <h3>No deliveries yet</h3>
    <p>Accept orders from the list above to start delivering.</p>
  </div>
</div>
</body>
</html>
