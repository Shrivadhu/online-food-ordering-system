<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Checkout – Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
  <a href="/customer/home" class="navbar-brand">&#127828; Food Ordering System</span></a>
  <ul class="nav-links">
    <li><a href="/customer/home">Restaurants</a></li>
    <li><a href="/customer/orders">My Orders</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="/customer/cart" class="cart-badge">&#128722; <span th:text="${cartCount}">0</span></a>
    <form th:action="@{/auth/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn">Logout</button>
    </form>
  </div>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">Checkout</h1>
    <p class="page-subtitle">Review your order and complete payment</p>
  </div>
  <div th:if="${error}" class="alert alert-danger"><span th:text="${error}"></span></div>
  <div class="layout-split">
    <div>
      <form th:action="@{/customer/order/place}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="restaurantId" th:value="${cart.items[0].foodItem.menu.restaurant.userId}"/>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-header">Delivery Address</div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Deliver to</label>
              <input type="text" name="deliveryAddress" class="form-control" th:value="${customer.address}" placeholder="Enter full delivery address" required/>
            </div>
          </div>
        </div>
        <div class="card" style="margin-bottom:1.5rem;">
          <div class="card-header">Payment Method</div>
          <div class="card-body">
            <div style="display:flex;flex-direction:column;gap:12px;">
              <label style="display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;">
                <input type="radio" name="paymentType" value="UPI" checked style="accent-color:var(--primary);width:18px;height:18px;"/>
                <div><div style="font-weight:600;">UPI Payment</div><div style="font-size:0.8rem;color:var(--text-muted);">Pay via GPay, PhonePe, Paytm</div></div>
              </label>
              <label style="display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;">
                <input type="radio" name="paymentType" value="CREDIT_CARD" style="accent-color:var(--primary);width:18px;height:18px;"/>
                <div><div style="font-weight:600;">Credit / Debit Card</div><div style="font-size:0.8rem;color:var(--text-muted);">Visa, Mastercard, RuPay</div></div>
              </label>
              <label style="display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;">
                <input type="radio" name="paymentType" value="CASH_ON_DELIVERY" style="accent-color:var(--primary);width:18px;height:18px;"/>
                <div><div style="font-weight:600;">Cash on Delivery</div><div style="font-size:0.8rem;color:var(--text-muted);">Pay when food arrives</div></div>
              </label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-block">Place Order - Rs. <span th:text="${#numbers.formatDecimal(cart.calculateTotal(),1,2)}">0</span></button>
      </form>
    </div>
    <div>
      <div class="card">
        <div class="card-header">Order Summary</div>
        <div class="card-body">
          <div th:each="item : ${cart.items}" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
            <div>
              <div style="font-weight:600;font-size:0.92rem;" th:text="${item.foodItem.name}">Item</div>
              <div style="font-size:0.8rem;color:var(--text-muted);">Qty: <span th:text="${item.quantity}">1</span></div>
            </div>
            <div style="font-weight:600;color:var(--accent);">Rs.<span th:text="${item.calculatePrice()}">0</span></div>
          </div>
          <div style="padding-top:14px;">
            <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:800;border-top:1px solid var(--border);padding-top:12px;margin-top:8px;">
              <span>Total</span>
              <span style="color:var(--accent);">Rs.<span th:text="${#numbers.formatDecimal(cart.calculateTotal(),1,2)}">0</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
