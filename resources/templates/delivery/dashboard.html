<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Delivery Dashboard - Food Ordering System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/delivery/dashboard" class="navbar-brand">Food Ordering System</a>
  <ul class="nav-links">
    <li><a href="/delivery/dashboard" class="active">Dashboard</a></li>
    <li><a href="/delivery/orders">My Deliveries</a></li>
  </ul>
  <form th:action="@{/auth/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</nav>
<div class="page-wrapper">
  <div class="page-header">
    <h1 class="page-title">Welcome, <span th:text="${dp.name}">Driver</span></h1>
    <p class="page-subtitle">Vehicle: <span th:text="${dp.vehicleNo}"></span></p>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon green">&#10003;</div>
      <div><div class="stat-value" th:text="${totalDelivered}">0</div><div class="stat-label">Delivered</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">&#128665;</div>
      <div><div class="stat-value" th:text="${activeDeliveries}">0</div><div class="stat-label">Active</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">Recent Deliveries <a href="/delivery/orders" class="btn btn-outline btn-sm">View All</a></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Order #</th><th>Customer</th><th>Restaurant</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>
          <tr th:each="order : ${myOrders}">
            <td>#<span th:text="${order.orderId}"></span></td>
            <td th:text="${order.customer.name}"></td>
            <td th:text="${order.restaurant.restaurantName}"></td>
            <td style="color:var(--accent);font-weight:600;">Rs.<span th:text="${#numbers.formatDecimal(order.totalAmount,1,2)}"></span></td>
            <td><span class="badge" th:classappend="'badge-' + ${#strings.toLowerCase(order.status)}" th:text="${order.status}"></span></td>
          </tr>
          <tr th:if="${#lists.isEmpty(myOrders)}">
            <td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">No deliveries yet.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div style="margin-top:1.5rem;">
    <a href="/delivery/orders" class="btn btn-primary btn-lg">View Available Orders</a>
  </div>
</div>
</body>
</html>
