<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Restaurants - Admin</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<nav class="navbar">
  <a href="/admin/dashboard" class="navbar-brand">Food Ordering System Admin</a>
  <ul class="nav-links">
    <li><a href="/admin/dashboard">Dashboard</a></li>
    <li><a href="/admin/orders">Orders</a></li>
    <li><a href="/admin/users">Users</a></li>
    <li><a href="/admin/restaurants" class="active">Restaurants</a></li>
  </ul>
  <form th:action="@{/auth/logout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="logout-btn">Logout</button>
  </form>
</nav>
<div class="page-wrapper">
  <div class="page-header"><h1 class="page-title">Restaurants</h1></div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Restaurant Name</th><th>Owner</th><th>Email</th><th>Location</th></tr></thead>
        <tbody>
          <tr th:each="r : ${restaurants}">
            <td th:text="${r.userId}"></td>
            <td style="font-weight:600;" th:text="${r.restaurantName}"></td>
            <td th:text="${r.name}"></td>
            <td th:text="${r.email}"></td>
            <td style="color:var(--text-muted);" th:text="${r.location}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
